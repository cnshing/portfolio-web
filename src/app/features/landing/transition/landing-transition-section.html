<div class="text-color-accent bg-color-page py-2xl">
  <svg
    viewBox="0 0 1920 250"
    fill="none"
    xmlns="http://www.w3.org/2000/svg"
    style="overflow: visible;"
    preserveAspectRatio="xMidYMid meet"
    [ngClass]="{ 'scale-x-[-1]': this.direction() === 'left' }"
  >

    <defs>
      <!-- Traveling white-hot highlight -->
      <linearGradient id="tube-highlight" gradientUnits="userSpaceOnUse"
      x1="0" y1="0" x2="1920" y2="0">
      <stop offset="0%"   stop-color="white" stop-opacity="0" />
      <stop offset="45%"  stop-color="white" stop-opacity="0.7" />
      <stop offset="50%"  stop-color="white" stop-opacity="1" />
      <stop offset="55%"  stop-color="white" stop-opacity="0.7" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>






      <!-- Animate the gradient movement -->
      <animate
      xlink:href="#tube-highlight"
      attributeName="x1"
      values="
        -1920;
         2112;
         2112;
        -1920;
        -1920
      "
      keyTimes="0; 0.4; 0.55; 0.95; 1"
      dur="7s"
      repeatCount="indefinite"
      calcMode="linear"
    />

    <animate
      xlink:href="#tube-highlight"
      attributeName="x2"
      values="
           0;
        4032;
        4032;
           0;
           0
      "
      keyTimes="0; 0.4; 0.55; 0.95; 1"
      dur="7s"
      repeatCount="indefinite"
      calcMode="linear"
    />




    </defs>

    <!-- Glow animation wraps ALL strokes -->
    <g class="animate-glow">

      <!-- ============================= -->
      <!--        TOP SEGMENT           -->
      <!-- ============================= -->
      <g>
        <!-- Base constant tube (full brightness) -->
        <path
          d="M 1920 0 H 1700"
          stroke="currentColor"
          stroke-opacity="0.85"
          stroke-width="0.1875rem"
          stroke-linecap="round"
        />

        <!-- White-hot traveling highlight -->
        <path
          d="M 1920 0 H 1700"
          stroke="url(#tube-highlight)"
          stroke-width="0.1875rem"
          stroke-linecap="round"
        />
      </g>

      <!-- ============================= -->
      <!--        DIAGONAL SEGMENT      -->
      <!-- ============================= -->
      <g>
        <!-- Base constant tube -->
        <path
          d="M 1700 0 L 1400 250"
          stroke="currentColor"
          stroke-opacity="0.85"
          stroke-width="0.1875rem"
          stroke-linecap="round"
        />

        <!-- White-hot highlight -->
        <path
          d="M 1700 0 L 1400 250"
          stroke="url(#tube-highlight)"
          stroke-width="0.1875rem"
          stroke-linecap="round"
        />
      </g>

      <!-- ============================= -->
      <!--       BOTTOM SEGMENT         -->
      <!-- ============================= -->
      <g>
        <!-- Base constant tube -->
        <path
          d="M 1400 250 H 0"
          stroke="currentColor"
          stroke-opacity="0.85"
          stroke-width="0.1875rem"
          stroke-linecap="round"
        />

        <!-- White-hot traveling highlight -->
        <path
          d="M 1400 250 H 0"
          stroke="url(#tube-highlight)"
          stroke-width="0.1875rem"
          stroke-linecap="round"
        />
      </g>

    </g>
  </svg>
</div>
