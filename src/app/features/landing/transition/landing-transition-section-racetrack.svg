  <svg class="relative text-color-accent" viewBox="0 0 1920 250" fill="none" xmlns="http://www.w3.org/2000/svg" style="overflow: visible;" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="tube-highlight" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1920" y2="0">
        <stop offset="0%" stop-color="white" stop-opacity="0" />
        <stop offset="45%" stop-color="white" stop-opacity="0.7" />
        <stop offset="50%" stop-color="white" stop-opacity="1" />
        <stop offset="55%" stop-color="white" stop-opacity="0.7" />
        <stop offset="100%" stop-color="white" stop-opacity="0" />
      </linearGradient>
      <animate xlink:href="#tube-highlight" attributeName="x1" values="-1920;2112;2112;-1920;-1920" keyTimes="0;0.4;0.55;0.95;1" dur="7s" repeatCount="indefinite" calcMode="linear" />
      <animate xlink:href="#tube-highlight" attributeName="x2" values="0;4032;4032;0;0" keyTimes="0;0.4;0.55;0.95;1" dur="7s" repeatCount="indefinite" calcMode="linear" />
      <symbol id="tube-top" overflow="visible">
        <path d="M 1920 0 H 1700" stroke="currentColor" stroke-opacity="0.85" stroke-width="0.1875rem" stroke-linecap="round" />
        <path d="M 1920 0 H 1700" stroke="url(#tube-highlight)" stroke-width="0.1875rem" stroke-linecap="round" />
      </symbol>
      <symbol id="tube-diagonal">
        <path d="M 1700 0 L 1400 250" stroke="currentColor" stroke-opacity="0.85" stroke-width="0.1875rem" stroke-linecap="round" />
        <path d="M 1700 0 L 1400 250" stroke="url(#tube-highlight)" stroke-width="0.1875rem" stroke-linecap="round" />
      </symbol>
      <symbol id="tube-bottom">
        <path d="M 1400 250 H 0" stroke="currentColor" stroke-opacity="0.85" stroke-width="0.24375rem" stroke-linecap="round" />
        <path d="M 1400 250 H 0" stroke="url(#tube-highlight)" stroke-width="0.24375rem" stroke-linecap="round" />
      </symbol>
    </defs>
    <path d="M1920 0
          L1700 0
          L1400 250
          L1920 250
          Z"
      stroke="none"
      [attr.fill]="fillTransitionMask()"
    />
    <g class="animate-glow">
      <use href="#tube-top" />
      <use href="#tube-diagonal" />
      <use href="#tube-bottom" />
    </g>
  </svg>